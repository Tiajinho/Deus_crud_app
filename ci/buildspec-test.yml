version: 0.2

# Pull-request quality gate: tests + lint only, no image build or deploy.
phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - python -m pip install --upgrade pip
      - pip install -r requirements-dev.txt

  build:
    commands:
      - ruff check .
      - ruff format --check .
      - pytest
